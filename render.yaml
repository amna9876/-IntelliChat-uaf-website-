services:
  - type: web
    name: uaf-campus-portal
    env: node
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DB_PATH
        value: ./backend/database/uaf.json
      - key: ALLOWED_ORIGIN
        sync: false
